[pytest]
# Fast test configuration - for quick validation (< 5 minutes)
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=.
    --cov-report=term
    --cov-fail-under=95
    --strict-markers
    -m "not slow and not integration"
    -x
    -q
    --timeout=60
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    hypothesis: marks tests as hypothesis-based property tests
    boundary: marks tests as boundary value analysis tests
    regression: marks tests as regression tests
    parameter_recovery: marks test for parameter recovery validation
    functional: marks tests testing functional requirements
    timeout: marks tests with timeout
filterwarnings =
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:tensorflow.*
    error::PendingDeprecationWarning
