  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check

  - repo: local
    hooks:
      # - id: pytest-check
      #   name: pytest-check
      #   entry: python3 -m pytest --collect-only -q
      #   language: system
      #   pass_filenames: false
      #   always_run: true

      - id: check-imports
        name: check-imports
        entry: python3 -c "import ast; import sys; [ast.parse(open(f).read(), f) for f in sys.argv[1:] if f.endswith('.py')]"
        language: system
        types: [python]

