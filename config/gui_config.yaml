# GUI Configuration
# Window settings
window_width: 1200
window_height: 800

# Update and monitoring settings
update_interval: 10  # seconds between GUI updates
data_retention: 30  # days to retain data
monitoring_threshold: 0.05  # error rate threshold for monitoring

# Progress and threading settings
enable_progress_bars: true
max_threads: 4
auto_save_interval: 30  # seconds between auto-saves
