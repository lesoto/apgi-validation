# APGI Psychological States GUI Configuration
# ==========================================
# Default parameters and settings for the APGI visualization system

# Simulation Parameters
simulation:
  # Surprise accumulation timescale (seconds)
  tau_S_default: 0.5
  tau_S_min: 0.1
  tau_S_max: 1.0

  # Threshold adaptation timescale (seconds)
  tau_theta_default: 30.0
  tau_theta_min: 5.0
  tau_theta_max: 60.0

  # Baseline ignition threshold
  theta_0_default: 0.5
  theta_0_min: 0.1
  theta_0_max: 0.9

  # Sigmoid steepness parameter
  alpha_default: 5.0
  alpha_min: 2.0
  alpha_max: 20.0

# Visualization Settings
visualization:
  # Cache settings
  cache_max_size: 50
  cache_enabled: true

  # Default figure dimensions
  figure_width: 12
  figure_height: 8

  # Color scheme
  color_scheme: "categorical"
  default_opacity: 0.8

  # Performance settings
  max_states_radar: 10
  heatmap_resolution: 50

# GUI Settings
gui:
  # Window settings
  default_width: 1400
  default_height: 900

  # Update intervals (milliseconds)
  status_update_interval: 100
  progress_update_interval: 500

  # Font settings
  font_family: "Arial"
  font_size_normal: 9
  font_size_small: 8
  font_size_large: 14

# State Selection Defaults
state_selection:
  # Default states for radar comparison
  default_radar_states:
    - "flow"
    - "anxiety"
    - "calm"

  # Default visualization type
  default_visualization: "3D State Network"

# File and Directory Settings
files:
  # Temporary file settings
  temp_file_prefix: "apgi_viz_"
  cleanup_temp_on_exit: true

  # Logging settings
  log_level: "INFO"
  log_to_file: false

# Advanced Settings
advanced:
  # Memory management
  max_memory_usage_mb: 500
  gc_threshold: 100

  # Error handling
  show_detailed_errors: true
  error_recovery_attempts: 3

  # Performance optimization
  use_multiprocessing: false
  parallel_workers: 2
