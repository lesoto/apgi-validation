[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --strict-markers
    --durations=10
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    hypothesis: marks tests as hypothesis-based property tests
    boundary: marks tests as boundary value analysis tests
    regression: marks tests as regression tests
    parameter_recovery: marks test for parameter recovery validation
    functional: marks tests testing functional requirements
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
