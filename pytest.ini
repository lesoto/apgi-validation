[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=apgi_core.engine
    --cov=apgi_core.model
    --cov=main
    --cov=utils.apgi_config
    --cov=utils.apgi_settings
    --cov=utils.secure_key_manager
    --cov=utils.secret_policy_enforcer
    --cov=utils.auth_adapter
    --cov=utils.security_gateway
    --cov=utils.security_logging_integration
    --cov=utils.config_manager
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=30
    --cov-config=.coveragerc
    --strict-markers
    --durations=10
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    performance: marks tests as performance tests
    hypothesis: marks tests as hypothesis-based property tests
    boundary: marks tests as boundary value analysis tests
    regression: marks tests as regression tests
    parameter_recovery: marks test for parameter recovery validation
    functional: marks tests testing functional requirements
    timeout: marks tests with timeout
filterwarnings =
    # Only ignore specific deprecation warnings from third-party libraries
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:tensorflow.*
    # Convert pending deprecation warnings to errors to catch early
    error::PendingDeprecationWarning
